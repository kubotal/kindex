{{ if .Values.ingress.enabled }}
{{ if or (eq .Values.ingress.class "nginx") (eq .Values.ingress.class "haproxy") }}

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "kindex.ingressName" . }}
  labels:
    {{- include "kindex.labels" . | nindent 4 }}
  annotations:
    {{- with .Values.ingress.annotations }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- with .Values.commonAnnotations }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.class }}
  rules:
    - host: {{ required "ingress.host must be defined!" .Values.ingress.host }}
      http:
        paths:
          - backend:
              service:
                name: {{ include "kindex.serviceName" . }}
                port:
                  number: {{ .Values.server.bindPort }}
            path: /
            pathType: Prefix
{{ else }}
  {{- fail "Unmanaged ingress class" }}
{{ end }}
{{ end }}


